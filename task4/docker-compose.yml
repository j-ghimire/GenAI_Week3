services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - "./sql/seed .sql:/docker-entrypoint-initdb.d/seed.sql:ro"

  api:
    build: .
    depends_on:
      - db
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/appdb
      - GEMINI_API_KEY
      - GEMINI_MODEL
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  web:
    build: .
    depends_on:
      - api
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000/agent/sql
    ports:
      - "8501:8501"
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    volumes:
      - ./:/app

volumes:
  db-data:
